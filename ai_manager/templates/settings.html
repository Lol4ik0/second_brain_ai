{% extends 'base.html' %}
{% load static %}

{% block title %}
  Second Brain - Settings
{% endblock %}

{% block content %}
  <main class="p-8 lg:p-12 max-w-5xl mx-auto w-full">
    <header class="mb-10">
      <h1 class="text-3xl font-bold text-[var(--text-primary)] mb-2">Settings</h1>
      <p class="text-[var(--text-secondary)]">Customize your global Second Brain experience.</p>
    </header>

    <div class="grid grid-cols-1 gap-8 settings-container">
      
      <section class="glass-card rounded-xl p-6">
        <h2 class="text-xl font-semibold text-[var(--text-primary)] mb-6 flex items-center gap-2">
          <span>👤</span> Profile Configuration
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label for="display-name" class="text-sm font-medium">Display Name</label>
            <input type="text" id="display-name" class="input-field rounded-lg px-4 py-2 w-full" value="{{ config.display_name }}" />
          </div>
          <div class="flex flex-col gap-2">
            <label for="email-address" class="text-sm font-medium">Email Address</label>
            <input type="email" id="email-address" class="input-field rounded-lg px-4 py-2 w-full" value="{{ config.email }}">
          </div>
        </div>
      </section>

      <section class="glass-card rounded-xl p-6">
        <h2 class="text-xl font-semibold text-[var(--text-primary)] mb-6 flex items-center gap-2">
          <span>🎨</span> Appearance
        </h2>
        
        <div class="flex flex-col gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-sm font-medium">System Theme</label>
            <select id="theme-select" class="input-field rounded-lg px-4 py-2 w-full md:w-1/2">
              <option value="cyberpunk" {% if config.theme == 'cyberpunk' %}selected{% endif %}>Cyberpunk Dark</option>
              <option value="light" {% if config.theme == 'light' %}selected{% endif %}>High-Contrast Light</option>
            </select>
          </div>

          <div class="flex flex-col gap-3">
            <label class="text-sm font-medium">Accent Color</label>
            <div class="flex items-center gap-6">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="accent-color" value="cyan" {% if config.accent_color == 'cyan' or not config.accent_color %}checked{% endif %} />
                <span class="text-[#00F0FF] font-semibold tracking-wide">Cyan</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="accent-color" value="purple" {% if config.accent_color == 'purple' %}checked{% endif %} />
                <span class="text-[#B026FF] font-semibold tracking-wide">Purple</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="accent-color" value="green" {% if config.accent_color == 'green' %}checked{% endif %} />
                <span class="text-[#00FF41] font-semibold tracking-wide">Green</span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <section class="glass-card rounded-xl p-6">
        <h2 class="text-xl font-semibold text-[var(--text-primary)] mb-6 flex items-center gap-2">
          <span>✨</span> AI Assistant Core
        </h2>

        <div class="flex flex-col gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-sm font-medium">Language Model</label>
            <select id="ai-model" class="input-field rounded-lg px-4 py-2 w-full md:w-1/2">
                <option value="llama3" {% if config.ai_model == 'llama3' %}selected{% endif %}>Llama 3 (Ollama)</option>
                <option value="phi3" {% if config.ai_model == 'phi3' %}selected{% endif %}>Phi 3 (Ollama)</option>
            </select>
          </div>

          <div class="flex flex-col gap-2 w-full md:w-1/2">
            <label for="ai-temperature" class="text-sm font-medium flex justify-between">
              <span>Creativity Temperature</span>
              <span id="temp-value" class="text-[var(--active-accent)] font-bold">{{ config.temperature }}</span>
            </label>
            <input type="range" id="ai-temperature" min="0" max="1" step="0.1" value="{{ config.temperature }}" class="w-full cursor-pointer accent-[var(--active-accent)]" />
          </div>
        </div>
      </section>

    </div>
  </main>
  
  <script src="{% static 'js/settings.js' %}"></script>
{% endblock %}
