<!DOCTYPE html>
<html lang="en" data-theme="cyberpunk" data-accent="cyan">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain - Core Terminal Authentication</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-[#0D0D12] h-screen w-screen flex items-center justify-center relative font-sans overflow-hidden">
    
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-[#00F0FF] opacity-5 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-[#B026FF] opacity-5 rounded-full blur-[120px]"></div>

    <main class="w-full max-w-md p-4 relative z-10">
        <div class="glass-card rounded-2xl p-8 shadow-2xl border border-white border-opacity-10">
            <header class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">System Access</h1>
                <p class="text-gray-400 text-sm">Initialize validation keys to load your Second Brain core.</p>
            </header>

            {% if error %}
                <div class="mb-6 p-4 rounded-lg bg-red-500 bg-opacity-10 border border-red-500 border-opacity-30 text-red-400 text-sm font-medium">
                    ⚠️ {{ error }}
                </div>
            {% endif %}

            <form method="POST" class="flex flex-col gap-5">
                {% csrf_token %}
                <div class="flex flex-col gap-2">
                    <label for="id_username" class="text-xs uppercase tracking-wider font-semibold text-gray-300">Username</label>
                    <input type="text" name="username" id="id_username" required autofocus class="input-field rounded-xl px-4 py-3 w-full bg-black bg-opacity-40 text-white border border-white border-opacity-10 focus:border-[#00F0FF] outline-none transition-all" placeholder="Enter security handle...">
                </div>

                <div class="flex flex-col gap-2">
                    <label for="id_password" class="text-xs uppercase tracking-wider font-semibold text-gray-300">Password Encryption Key</label>
                    <input type="password" name="password" id="id_password" required class="input-field rounded-xl px-4 py-3 w-full bg-black bg-opacity-40 text-white border border-white border-opacity-10 focus:border-[#00F0FF] outline-none transition-all" placeholder="Enter key matrices...">
                </div>

                <button type="submit" class="btn-primary w-full py-3.5 mt-4 rounded-xl font-bold uppercase tracking-wider text-sm border border-[#00F0FF] text-[#00F0FF] hover:bg-[#00F0FF] hover:text-black transition-all shadow-[0_0_15px_rgba(0,240,255,0.2)]">
                    Authenticate Session
                </button>
            </form>

            <footer class="mt-8 text-center border-t border-white border-opacity-5 pt-6">
                <p class="text-sm text-gray-400">
                    New database operator? 
                    <a href="{% url 'register' %}" class="text-[#00F0FF] font-semibold hover:underline ml-1">Create an Identity</a>
                </p>
            </footer>
        </div>
    </main>
</body>
</html>
