<!DOCTYPE html>
<html lang="en" data-theme="{{ config.theme }}" data-accent="{{ config.accent_color|default:'cyan' }}">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Second Brain{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="bg-[var(--bg-base)] text-[var(--text-secondary)] font-sans h-screen overflow-hidden transition-colors duration-300">
    <div id="app-wrapper" class="flex h-screen w-screen">
        {% include "sidebar.html" with active=active_page %}
        
        <div class="flex-1 flex flex-col h-screen overflow-y-auto lg:overflow-hidden relative">            
            <header class="lg:hidden flex items-center justify-between p-4 border-b border-[var(--border-glass)] bg-[var(--bg-sidebar)] z-40 shadow-md">
                <div class="flex items-center gap-3">
                    <button id="mobile-menu-open" class="text-[var(--active-accent)] p-2 bg-[var(--bg-glass)] rounded-lg focus:outline-none shadow-[var(--glow-active)]">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 class="font-bold text-[var(--text-primary)] tracking-widest uppercase text-sm">MENU</h1>
                </div>
            </header>

            {% block content %}
            {% endblock %}
        </div>
    </body>
    <script src="{% static 'js/layout.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('main-sidebar');
            const openBtn = document.getElementById('mobile-menu-open');
            const closeBtn = document.getElementById('mobile-menu-close');

            if (openBtn && sidebar) {
                openBtn.addEventListener('click', () => sidebar.classList.remove('-translate-x-full'));
            }
            if (closeBtn && sidebar) {
                closeBtn.addEventListener('click', () => sidebar.classList.add('-translate-x-full'));
            }
        });
    </script>
</html>
